# Netlify configuration for LitmusAI
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

# Build environment
[build.environment]
  NODE_VERSION = "18"
  # Disable Python build detection
  PYTHON_VERSION = ""
  # Disable secrets scanning (secrets are in environment variables, not in code)
  SECRETS_SCAN_ENABLED = "false"

[context.production.environment]
  VITE_API_URL = "https://ai-literacy-platform.onrender.com"
  VITE_AUTH_MODE = "auth0"
  VITE_AUTH0_DOMAIN = "https://litmusai.us.auth0.com"
  VITE_AUTH0_CLIENT_ID = "rJVPV5C28rl38LggrVvlKppZ19I8EIlj"
  VITE_AUTH0_AUDIENCE = "https://litmusai.us.auth0.com/api/v2/"
  VITE_AUTH0_REDIRECT_URI = "https://litmusai.netlify.app/auth/callback"

# Billing routes and Stripe webhook callbacks are canonical on the backend API at `VITE_API_URL`.
# Legacy Netlify billing functions proxy to the backend and are not a second source of truth.
# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
